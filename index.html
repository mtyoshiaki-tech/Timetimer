<style>
/* スムーズなアニメーション用のカスタムスタイル（不要なCSSトランジションを削除してシームレスな動的描画に特化） */
.circle-ring {
transform-origin: 50% 50%;
}

0%, 100% {
transform: scale(1);
box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
}
50% {
transform: scale(1.05);
box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0);

animation: pulse-red 1.5s infinite;

<body class="bg-black text-white h-full flex flex-col font-sans select-none overflow-hidden">

<!-- メインコンテンツ -->

<!-- Web Audio API を用いた効果音生成シンセサイザー -->
<script>
let audioCtx = null;
let alarmTimer = null; // ループ鳴動用のインターバルタイマー
let isAlarmActive = false; // アラーム作動状態フラグ

// 音声の初期化。サスペンド状態も確実にレジュームさせる
function initAudio() {
if (!audioCtx) {
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
if (audioCtx && audioCtx.state === 'suspended') {
audioCtx.resume().catch(err => console.log("AudioContext resume failed:", err));
}
}

// 初回ユーザーアクションによる音声アクティベーション
const unlockAudio = () => {
initAudio();
document.removeEventListener('click', unlockAudio);
document.removeEventListener('touchstart', unlockAudio);
};
document.addEventListener('click', unlockAudio);
document.addEventListener('touchstart', unlockAudio);

// 指定 of 音源タイプを単発再生する関数 (内部呼び出し用)
function playAlertSoundSingle(type) {
initAudio();
if (!audioCtx) return;

const now = audioCtx.currentTime;

if (type === 'chime') {
for (let i = 0; i < 4; i++) {
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.type = 'sine';
osc.frequency.setValueAtTime(880, now + i * 0.15); // ややテンポ良く鳴らす

gain.gain.setValueAtTime(0, now + i * 0.15);
gain.gain.linearRampToValueAtTime(0.4, now + i * 0.15 + 0.03);
gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.12);

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start(now + i * 0.15);
osc.stop(now + i * 0.15 + 0.14);
}
} else if (type === 'space') {
// --- テンションの上がるエレクトロニック・ミュージック（150 BPM テクノ） ---
const tempo = 150; // BPM
const beatDuration = 60 / tempo; // 1拍 = 0.4秒

// 1. 強力な4つ打ちキックドラム（4拍）
for (let b = 0; b < 4; b++) {
const kickTime = now + b * beatDuration;

const kickOsc = audioCtx.createOscillator();
const kickGain = audioCtx.createGain();

kickOsc.type = 'sine';
kickOsc.frequency.setValueAtTime(150, kickTime);
kickOsc.frequency.exponentialRampToValueAtTime(0.01, kickTime + 0.15);

kickGain.gain.setValueAtTime(0.6, kickTime);
kickGain.gain.exponentialRampToValueAtTime(0.01, kickTime + 0.15);

kickOsc.connect(kickGain);
kickGain.connect(audioCtx.destination);

kickOsc.start(kickTime);
kickOsc.stop(kickTime + 0.16);
}

// 2. テンションの上がる高速エレクトロ・シンセ・アルペジオ (8分音符で弾む)
// Cマイナー・ペンタトニックスケール
const melody = [523.25, 622.25, 783.99, 523.25, 783.99, 932.33, 1046.50, 783.99];
for (let i = 0; i < 8; i++) {
const noteTime = now + i * (beatDuration / 2);

const osc = audioCtx.createOscillator();
const filter = audioCtx.createBiquadFilter();
const gain = audioCtx.createGain();

osc.type = 'sawtooth'; // 歪みとパンチのある鋸歯状波
osc.frequency.setValueAtTime(melody[i], noteTime);

// フィルターエンベロープで「ミョンミョン」したシンセリードを演出
filter.type = 'lowpass';
filter.Q.setValueAtTime(4, noteTime);
filter.frequency.setValueAtTime(1500, noteTime);
filter.frequency.exponentialRampToValueAtTime(400, noteTime + 0.18);

gain.gain.setValueAtTime(0, noteTime);
gain.gain.linearRampToValueAtTime(0.12, noteTime + 0.02);
gain.gain.exponentialRampToValueAtTime(0.001, noteTime + 0.18);

osc.connect(filter);
filter.connect(gain);
gain.connect(audioCtx.destination);

osc.start(noteTime);
osc.stop(noteTime + 0.19);
}
} else if (type === 'spring') {
// --- 春 of 朝をイメージした爽やかでリズミカルな音楽（120 BPM マリンバ/ベル風） ---
const tempo = 120; // BPM
const beatDuration = 60 / tempo; // 1拍 = 0.5秒

// 爽やかで明るく弾むコードアルペジオ (C Major -> F Major -> G Major -> C Major風の動き)
const melody = [523.25, 659.25, 783.99, 1046.50, 880.00, 698.46, 523.25, 987.77, 783.99, 587.33, 523.25, 659.25, 783.99, 1046.50, 783.99, 659.25];
const noteInterval = beatDuration / 2; // 0.25秒

for (let i = 0; i < melody.length; i++) {
const noteTime = now + i * noteInterval;

const osc = audioCtx.createOscillator();
const oscSub = audioCtx.createOscillator(); // 明るさと厚みを出すサブオシレーター
const gain = audioCtx.createGain();

osc.type = 'triangle';
osc.frequency.setValueAtTime(melody[i], noteTime);

oscSub.type = 'sine';
oscSub.frequency.setValueAtTime(melody[i] * 2, noteTime); // 1オクターブ上で心地良いきらめきをプラス

gain.gain.setValueAtTime(0, noteTime);
gain.gain.linearRampToValueAtTime(0.15, noteTime + 0.01);
gain.gain.exponentialRampToValueAtTime(0.001, noteTime + 0.16);

osc.connect(gain);
oscSub.connect(gain);
gain.connect(audioCtx.destination);

osc.start(noteTime);
oscSub.start(noteTime);
osc.stop(noteTime + 0.18);
oscSub.stop(noteTime + 0.18);
}
} else if (type === 'pulse') {
for (let i = 0; i < 2; i++) {
const osc1 = audioCtx.createOscillator();
const osc2 = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc1.type = 'sine';
osc2.type = 'triangle';

osc1.frequency.setValueAtTime(329.63, now + i * 0.4);
osc2.frequency.setValueAtTime(331.63, now + i * 0.4);

gain.gain.setValueAtTime(0, now + i * 0.4);
gain.gain.linearRampToValueAtTime(0.4, now + i * 0.4 + 0.05);
gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.4 + 0.7);

osc1.connect(gain);
osc2.connect(gain);
gain.connect(audioCtx.destination);

osc1.start(now + i * 0.4);
osc2.start(now + i * 0.4);
osc1.stop(now + i * 0.4 + 0.38);
osc2.stop(now + i * 0.4 + 0.38);
}
}
}

// アラーム音を無限ループで開始する関数
function startAlarmLoop(type) {
if (isAlarmActive) return;
isAlarmActive = true;

const triggerSound = () => {
if (!isAlarmActive) return;
playAlertSoundSingle(type);
};

triggerSound(); // 初回再生

// 音源タイプごとに再生間隔を設定
let intervalTime = 1800; // デフォルト 1.8秒
if (type === 'chime') intervalTime = 1200; // チャイムは短めピピッ×4
if (type === 'space') intervalTime = 1600; // 1.6秒周期で150BPM 4小節ループと完全シンクロ
if (type === 'spring') intervalTime = 4000; // 16音（0.25秒×16 = 4.0秒）のメロディなので、ループ周期を4秒に設定
if (type === 'pulse') intervalTime = 1500;

alarmTimer = setInterval(triggerSound, intervalTime);
}

// アラームを完全に停止する関数
function stopAlarmLoop() {
isAlarmActive = false;
if (alarmTimer) {
clearInterval(alarmTimer);
alarmTimer = null;
}
}
</script>

<!-- アプリケーションのメイン状態・ロジック -->
<script>
// DOM要素の参照
const spiralActive = document.getElementById('spiral-active');
const spiralGuide = document.getElementById('spiral-guide');
const dialTicks = document.getElementById('dial-ticks');
const timerContainer = document.getElementById('timer-container');

const selectHours = document.getElementById('select-hours');
const selectMinutes = document.getElementById('select-minutes');
const selectSeconds = document.getElementById('select-seconds');
const targetTimeDisplay = document.getElementById('target-time-display');

const ringCountLabel = document.getElementById('ring-count-label');

const timerText = document.getElementById('timer-text');
const subMilliText = document.getElementById('sub-millisecond-text');

const scheduledBell = document.getElementById('scheduled-bell');
const scheduledTime = document.getElementById('scheduled-time');

const cancelBtn = document.getElementById('cancel-btn');
const startBtn = document.getElementById('start-btn');
const startBtnText = document.getElementById('start-btn-text');

const toastMessage = document.getElementById('toast-message');
const toastText = document.getElementById('toast-text');
const soundSelect = document.getElementById('sound-select');

// アプリの状態管理
let totalDurationSeconds = 600; // デフォルト10分
let remainingSeconds = 600;
let isRunning = false;
let isFinished = false; // アラーム作動状態
let animationFrameId = null; // requestAnimationFrame用ID
let lastTimestamp = 0; // ループ制御用タイムスタンプ
let ringCount = 1; // 1: 一重, 2: 二重, 3: 三重
let worker = null; // バックグラウンド処理用のWeb Worker

// SVGリングの基本パラメータ
const rOuter = 175;
const rMiddle = 145;
const rInner = 115;

// Web Workerの初期化（インラインBlobを使用してシングルファイル内にPWA互換のバックグラウンドスレッドを形成）
function initWorker() {
const workerCode = `
let timer = null;
self.onmessage = function(e) {
if (e.data.action === 'start') {
const endTime = e.data.endTime;
if (timer) clearInterval(timer);
timer = setInterval(() => {
if (Date.now() >= endTime) {
self.postMessage({ action: 'complete' });
clearInterval(timer);
}
}, 200);
} else if (e.data.action === 'stop') {
if (timer) clearInterval(timer);
}
};
`;
const blob = new Blob([workerCode], { type: 'application/javascript' });
const workerUrl = URL.createObjectURL(blob);
worker = new Worker(workerUrl);
worker.onmessage = function(e) {
if (e.data.action === 'complete') {
timerComplete();
}
};
}

// 初期設定
function initApp() {
// プルダウンメニューのオプションを生成
populateSelectOptions();

// 文字盤目盛りの描画
drawDialTicks();

// バックグラウンドWorkerの起動
initWorker();

// 保存されたセッションの復元チェック (GitHub Pages等で閉じられた時の時間・セッションリカバリー処理)
const savedEnd = localStorage.getItem('timer_end_time');
if (savedEnd) {
const endTime = parseInt(savedEnd, 10);
const now = Date.now();

// 状態を復元
totalDurationSeconds = parseInt(localStorage.getItem('timer_total_seconds') || '600', 10);
ringCount = parseInt(localStorage.getItem('timer_ring_count') || '1', 10);
soundSelect.value = localStorage.getItem('timer_sound_select') || 'chime';
setRingCount(ringCount);

if (now >= endTime) {
// 閉じている間に既に終了していた場合
remainingSeconds = 0;
isFinished = true;
updateTimerVisuals();
timerComplete();
} else {
// まだ実行中の場合：シームレスに再開
remainingSeconds = (endTime - now) / 1000;
isRunning = true;
isFinished = false;
startBtnText.textContent = "一時停止";
startBtn.className = "absolute right-0 bottom-2 w-12 h-12 md:w-14 md:h-14 rounded-full bg-amber-950/80 border border-amber-800/80 flex flex-col items-center justify-center text-amber-500 hover:bg-amber-900 transition active:scale-95 focus:outline-none";

disableSelectControls();
updateScheduledTime();
updateTimerVisuals();
updateControlPanelVisibility();

worker.postMessage({ action: 'start', endTime: endTime });
lastTimestamp = performance.now();
animationFrameId = requestAnimationFrame((timestamp) => runTimerAnimation(timestamp, endTime));
}
} else {
// 通常の新規初期同期
syncSelectsToDuration();
updateRingDisplay();
updateTimerVisuals();
updateControlPanelVisibility();
}

// イベントリスナーの登録
selectHours.addEventListener('change', handleInputChange);
selectMinutes.addEventListener('change', handleInputChange);
selectSeconds.addEventListener('change', handleInputChange);

cancelBtn.addEventListener('click', handleCancelClick);
startBtn.addEventListener('click', handleStartClick);

// Lucideアイコンのレンダリング
lucide.createIcons();
}

// プルダウン用のオプションを動的生成（日本語表記）
function populateSelectOptions() {
// 時間のオプション (0〜23)
selectHours.innerHTML = '';
for (let i = 0; i <= 23; i++) {
const opt = document.createElement('option');
opt.value = i;
opt.textContent = `${i}時間`;
selectHours.appendChild(opt);
}

// 分のオプション (0〜59)
selectMinutes.innerHTML = '';
for (let i = 0; i <= 59; i++) {
const opt = document.createElement('option');
opt.value = i;
opt.textContent = `${i}分`;
selectMinutes.appendChild(opt);
}

// 秒のオプション (0〜59)
selectSeconds.innerHTML = '';
for (let i = 0; i <= 59; i++) {
const opt = document.createElement('option');
opt.value = i;
opt.textContent = `${i}秒`;
selectSeconds.appendChild(opt);
}
}

// 文字盤に12時間分の目盛りを配置
function drawDialTicks() {
dialTicks.innerHTML = '';
for (let i = 0; i < 12; i++) {
const angle = (i * 30 * Math.PI) / 180;
const x1 = 200 + 185 * Math.sin(angle);
const y1 = 200 - 185 * Math.cos(angle);
const x2 = 200 + 180 * Math.sin(angle);
const y2 = 200 - 180 * Math.cos(angle);

const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
line.setAttribute("x1", x1);
line.setAttribute("y1", y1);
line.setAttribute("x2", x2);
line.setAttribute("y2", y2);
line.setAttribute("stroke", i % 3 === 0 ? "#52525b" : "#27272a");
line.setAttribute("stroke-width", i % 3 === 0 ? "2.5" : "1.5");
line.setAttribute("stroke-linecap", "round");
dialTicks.appendChild(line);
}
}

// アルキメデスの螺旋パス（12時から反時計回り、蚊取り線香型）を動的生成する
function generateSpiralPath(turns, startRadius, endRadius) {
const cx = 200, cy = 200;
const points = [];
const steps = 180 * turns; // 1周あたり180段階の高精度描画
const startAngle = -Math.PI / 2; // 12時の位置からスタート

for (let i = 0; i <= steps; i++) {
const t = i / steps; // 0.00 〜 1.00
const angle = startAngle - t * turns * 2 * Math.PI; // 反時計回りにturns周分回転
const r = startRadius - t * (startRadius - endRadius); // 半径が外側から内側へ滑らかに減少
const x = cx + r * Math.cos(angle);
const y = cy + r * Math.sin(angle);
points.push(`${i === 0 ? 'M' : 'L'} ${x.toFixed(2)} ${y.toFixed(2)}`);
}
return points.join(' ');
}

// リングの数（一重・二重・三重）を変更（再生中であっても変更可能）
function setRingCount(count) {
if (isFinished) return; // アラーム鳴動中のみ変更不可
ringCount = count;

// コントロールパネル側のボタンのアクティブ表現切り替え
const buttons = [
{ btn: document.getElementById('btn-ring-1'), count: 1 },
{ btn: document.getElementById('btn-ring-2'), count: 2 },
{ btn: document.getElementById('btn-ring-3'), count: 3 }
];

buttons.forEach(item => {
if (item.btn) {
if (item.count === count) {
item.btn.className = "py-2 text-xs font-bold rounded-lg transition-all bg-orange-500 text-black shadow";
} else {
item.btn.className = "py-2 text-xs font-bold rounded-lg transition-all text-zinc-400 hover:text-white";
}
}
});

// 開始時上部側のボタンのアクティブ表現切り替え
const activeButtons = [
{ btn: document.getElementById('btn-active-ring-1'), count: 1 },
{ btn: document.getElementById('btn-active-ring-2'), count: 2 },
{ btn: document.getElementById('btn-active-ring-3'), count: 3 }
];

activeButtons.forEach(item => {
if (item.btn) {
if (item.count === count) {
item.btn.className = "px-4 py-1 text-xs font-bold rounded-full transition-all bg-orange-500 text-black shadow";
} else {
item.btn.className = "px-4 py-1 text-xs font-bold rounded-full transition-all text-zinc-400 hover:text-white";
}
}
});

// リング数表示ラベルの更新
if (count === 1) {
ringCountLabel.textContent = "一重";
} else if (count === 2) {
ringCountLabel.textContent = "二重";
} else if (count === 3) {
ringCountLabel.textContent = "三重";
}

updateRingDisplay();
updateTimerVisuals();
}

// 各リング数に合わせた美しい蚊取り線香状（スパイラル）の背景ガイドラインを適用
function updateRingDisplay() {
let turns = ringCount;
let startR = rOuter;
let endR = rOuter;

if (ringCount === 2) endR = rMiddle;
if (ringCount === 3) endR = rInner;

// ガイドライン用のフル螺旋を生成・適用
const pathD = generateSpiralPath(turns, startR, endR);
spiralGuide.setAttribute('d', pathD);
}

// プリセットボタン
function setPreset(minutes) {
if (isRunning || isFinished) return;
selectHours.value = 0;
selectMinutes.value = minutes;
selectSeconds.value = 0;
handleInputChange();
}

// プルダウン変更 of 同期
function handleInputChange() {
let h = parseInt(selectHours.value) || 0;
let m = parseInt(selectMinutes.value) || 0;
let s = parseInt(selectSeconds.value) || 0;

totalDurationSeconds = (h * 3600) + (m * 60) + s;
if (totalDurationSeconds <= 0) {
totalDurationSeconds = 1;
}

remainingSeconds = totalDurationSeconds;

let text = "";
if (h > 0) text += `${h}時間 `;
if (m > 0 || h > 0) text += `${m}分 `;
text += `${s}秒`;
targetTimeDisplay.textContent = text;

updateTimerVisuals();
}

// インプット（プルダウン）値を秒から逆算して同期
function syncSelectsToDuration() {
const h = Math.floor(remainingSeconds / 3600);
const m = Math.floor((remainingSeconds % 3600) / 60);
const s = Math.floor(remainingSeconds % 60);

selectHours.value = h;
selectMinutes.value = m;
selectSeconds.value = s;

let text = "";
if (h > 0) text += `${h}時間 `;
if (m > 0 || h > 0) text += `${m}分 `;
text += `${s}秒`;
targetTimeDisplay.textContent = text;
}

// デジタル表示のフォーマット
function formatDigitalTime(sec) {
const h = Math.floor(sec / 3600);
const m = Math.floor((sec % 3600) / 60);
const s = Math.floor(sec % 60);

if (h > 0) {
return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
} else {
return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
}

// タイマー完了予定時刻の更新
function updateScheduledTime() {
if (!isRunning) {
scheduledBell.classList.add('opacity-0');
scheduledBell.classList.remove('opacity-100');
return;
}

const now = new Date();
const future = new Date(now.getTime() + remainingSeconds * 1000);
const h = String(future.getHours()).padStart(2, '0');
const m = String(future.getMinutes()).padStart(2, '0');

scheduledTime.textContent = `${h}:${m}`;
scheduledBell.classList.remove('opacity-0');
scheduledBell.classList.add('opacity-100');
}

// コントロールパネルの表示/非表示（タイマー開始時は設定パネル全体を隠し、上部にコンパクトなリング切替を表示）
function updateControlPanelVisibility() {
const isPlayingOrFinished = isRunning || isFinished;
const controlPanel = document.getElementById('control-panel');
const activeRingSelector = document.getElementById('active-ring-selector');

if (isPlayingOrFinished) {
// 開始時は左側のコントロールパネル全体を非表示にする
if (controlPanel) controlPanel.classList.add('hidden');
// 上部のコンパクトな切り替えボタンを表示
if (activeRingSelector) {
activeRingSelector.classList.remove('hidden');
activeRingSelector.classList.add('flex');
}

// タイマー画面を画面いっぱいに広く使うために、max-width制限を動的に拡大する
if (timerContainer) {
timerContainer.classList.remove('max-w-[min(420px,50vh)]');
timerContainer.classList.add('max-w-[min(650px,80vh)]');
}
} else {
// 停止・設定中は左側のコントロールパネル全体を表示する
if (controlPanel) controlPanel.classList.remove('hidden');
// 上部のコンパクトな切り替えボタンを非表示
if (activeRingSelector) {
activeRingSelector.classList.add('hidden');
activeRingSelector.classList.remove('flex');
}

// 元のサイズへ戻す
if (timerContainer) {
timerContainer.classList.remove('max-w-[min(650px,80vh)]');
timerContainer.classList.add('max-w-[min(420px,50vh)]');
}
}
}

// 残り時間（割合）に基づいて、外側が削れた残りの螺旋パスのみを動的に生成する関数 (シームレス端点ブレンド補間仕様)
function generateSpiralRemainingPath(turns, startRadius, endRadius, progress) {
if (progress <= 0) return '';

const cx = 200, cy = 200;
const points = [];
const steps = 180 * turns;
const startAngle = -Math.PI / 2;

// 残り割合に応じた正確な位置を算出
const tStart = 1.0 - progress;

// 1. 完全連続的な補間処理により、開始端点の座標を精密に算出（ガタつきを100%排除）
const angleStart = startAngle - tStart * turns * 2 * Math.PI;
const rStart = startRadius - tStart * (startRadius - endRadius);
const xStart = cx + rStart * Math.cos(angleStart);
const yStart = cy + rStart * Math.sin(angleStart);

// スタート位置を追加
points.push(`M ${xStart.toFixed(2)} ${yStart.toFixed(2)}`);

// 2. 次の整数ステップから残りの螺旋パス要素へ滑らかに結ぶ
const startStep = Math.ceil(tStart * steps);
for (let i = startStep; i <= steps; i++) {
const t = i / steps; // 0.00 〜 1.00
const angle = startAngle - t * turns * 2 * Math.PI; // 反時計回り
const r = startRadius - t * (startRadius - endRadius);
const x = cx + r * Math.cos(angle);
const y = cy + r * Math.sin(angle);

points.push(`L ${x.toFixed(2)} ${y.toFixed(2)}`);
}
return points.join(' ');
}

// 円形（らせん）タイマーの進捗ビジュアル描画 (動的パス描画アプローチ)
function updateTimerVisuals() {
// デジタルテキスト
timerText.textContent = formatDigitalTime(Math.ceil(remainingSeconds));

// 小数点（ミリ秒進捗）
const fraction = remainingSeconds % 1;
subMilliText.textContent = "." + Math.floor(fraction * 10);

// 全体の残り割合（1.00 〜 0.00）
const overallProgress = (isRunning && !isFinished)
? (totalDurationSeconds > 0 ? (remainingSeconds / totalDurationSeconds) : 0)
: 1.0;

// 残り割合に合わせ、表示するスパイラルパラメータを計算
let turns = ringCount;
let startR = rOuter;
let endR = rOuter;

if (ringCount === 2) endR = rMiddle;
if (ringCount === 3) endR = rInner;

// パスデータ自体の動的な反時計回り再計算
const activeD = generateSpiralRemainingPath(turns, startR, endR, overallProgress);
spiralActive.setAttribute('d', activeD);
}

// 右側：開始 / 一時停止 / 停止アクションのハンドラー
function handleStartClick() {
if (isFinished) {
stopTimerAndAlarm();
} else {
toggleTimer();
}
}

// 左側：キャンセル / リセットボタンのハンドラー
function handleCancelClick() {
if (isFinished) {
stopTimerAndAlarm();
} else {
resetTimer();
}
}

// 高精度アニメーションループ用 (requestAnimationFrame、誤差補正にDate.now()タイムスタンプを使用)
function runTimerAnimation(timestamp, endTime) {
if (!isRunning) return;

const now = Date.now();
remainingSeconds = (endTime - now) / 1000;

if (remainingSeconds <= 0) {
remainingSeconds = 0;
updateTimerVisuals();
timerComplete();
} else {
updateTimerVisuals();
animationFrameId = requestAnimationFrame((t) => runTimerAnimation(t, endTime));
}
}

// タイマー開始・一時停止のトグル
function toggleTimer() {
initAudio();

// システムプッシュ通知の権限リクエスト
if (Notification.permission === 'default') {
Notification.requestPermission();
}

if (isRunning) {
// 一時停止処理
if (animationFrameId) {
cancelAnimationFrame(animationFrameId);
animationFrameId = null;
}
isRunning = false;
startBtnText.textContent = "再開";
startBtn.className = "absolute right-0 bottom-2 w-12 h-12 md:w-14 md:h-14 rounded-full bg-emerald-950/80 border border-emerald-800/80 flex flex-col items-center justify-center text-emerald-400 hover:bg-emerald-900 transition active:scale-95 focus:outline-none";

// Workerおよび永続化終了タイムスタンプの破棄
if (worker) {
worker.postMessage({ action: 'stop' });
}
localStorage.removeItem('timer_end_time');

enableSelectControls();
updateScheduledTime();
updateTimerVisuals();
updateControlPanelVisibility();
} else {
// 開始・再開処理
if (remainingSeconds <= 0) {
remainingSeconds = totalDurationSeconds;
}

isRunning = true;
isFinished = false;
startBtnText.textContent = "一時停止";
startBtn.className = "absolute right-0 bottom-2 w-12 h-12 md:w-14 md:h-14 rounded-full bg-amber-950/80 border border-amber-800/80 flex flex-col items-center justify-center text-amber-500 hover:bg-amber-900 transition active:scale-95 focus:outline-none";

// 実行中に間違えて触れないようプルダウンをロック
disableSelectControls();
updateScheduledTime();
updateTimerVisuals();
updateControlPanelVisibility();

// バックグラウンド復帰用の絶対エポック時間の設定と永続化
const endTime = Date.now() + remainingSeconds * 1000;
localStorage.setItem('timer_end_time', endTime.toString());
localStorage.setItem('timer_total_seconds', totalDurationSeconds.toString());
localStorage.setItem('timer_ring_count', ringCount.toString());
localStorage.setItem('timer_sound_select', soundSelect.value);

// Web Worker経由でバックグラウンドスレッド時間追跡を開始
if (!worker) {
initWorker();
}
worker.postMessage({ action: 'start', endTime: endTime });

// アニメーションループを開始
lastTimestamp = performance.now();
animationFrameId = requestAnimationFrame((timestamp) => runTimerAnimation(timestamp, endTime));
}
}

// プルダウン操作の制限
function disableSelectControls() {
selectHours.disabled = true;
selectMinutes.disabled = true;
selectSeconds.disabled = true;
selectHours.classList.add('opacity-50', 'cursor-not-allowed');
selectMinutes.classList.add('opacity-50', 'cursor-not-allowed');
selectSeconds.classList.add('opacity-50', 'cursor-not-allowed');
}

function enableSelectControls() {
selectHours.disabled = false;
selectMinutes.disabled = false;
selectSeconds.disabled = false;
selectHours.classList.remove('opacity-50', 'cursor-not-allowed');
selectMinutes.classList.remove('opacity-50', 'cursor-not-allowed');
selectSeconds.classList.remove('opacity-50', 'cursor-not-allowed');
}

// タイマー完了（無限アラームの開始フェーズ、通知送信処理を実装）
function timerComplete() {
if (animationFrameId) {
cancelAnimationFrame(animationFrameId);
animationFrameId = null;
}
if (worker) {
worker.postMessage({ action: 'stop' });
}
// 正常終了のためセッションキーをクリア
localStorage.removeItem('timer_end_time');

isRunning = false;
isFinished = true;

// UIをアラーム用の「停止」ボタンに変更
startBtnText.textContent = "停止";
startBtn.className = "absolute right-0 bottom-2 w-12 h-12 md:w-14 md:h-14 rounded-full bg-red-600 border-2 border-red-400 flex flex-col items-center justify-center text-white font-black hover:bg-red-700 transition active:scale-95 focus:outline-none animate-pulse-red z-20";

startAlarmLoop(soundSelect.value);

toastMessage.classList.remove('translate-y-10', 'opacity-0');
toastMessage.classList.add('translate-y-0', 'opacity-100');
updateControlPanelVisibility();

// システムプッシュ通知の送信（ブラウザがバックグラウンド時や端末スリープ時に、タップで即座にアプリを開かせるためのフック）
if (Notification.permission === 'granted') {
const notification = new Notification("VISUAL TIMER", {
body: "設定時間が経過しました！タップしてアプリを開き、アラームを停止してください。",
icon: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f97316'><path d='M12 22c5.523 0 10-4.577 10-10S17.523 2 12 2 2 6.577 2 12s4.523 10 10 10z'/></svg>",
requireInteraction: true // ユーザーが明示的にアクションするまで通知を表示し続ける
});
notification.onclick = function() {
window.focus(); // クリック時にブラウザタブを強制フォーカス/起動
this.close();
};
}
}

// アラームを停止して通常画面に戻る
function stopTimerAndAlarm() {
stopAlarmLoop();
isFinished = false;
localStorage.removeItem('timer_end_time');

toastMessage.classList.remove('translate-y-0', 'opacity-100');
toastMessage.classList.add('translate-y-10', 'opacity-0');

resetTimer();
}

// 完全リセット
function resetTimer() {
if (animationFrameId) {
cancelAnimationFrame(animationFrameId);
animationFrameId = null;
}
stopAlarmLoop();
if (worker) {
worker.postMessage({ action: 'stop' });
}
localStorage.removeItem('timer_end_time');

isRunning = false;
isFinished = false;
remainingSeconds = totalDurationSeconds;

startBtnText.textContent = "開始";
startBtn.className = "absolute right-0 bottom-2 w-12 h-12 md:w-14 md:h-14 rounded-full bg-emerald-950/80 border border-emerald-800/80 flex flex-col items-center justify-center text-emerald-400 hover:bg-emerald-900 transition active:scale-95 focus:outline-none";

enableSelectControls();
syncSelectsToDuration();
updateScheduledTime();
updateTimerVisuals();
updateControlPanelVisibility();
}

// 起動時イニシャライズ
window.onload = () => {
initApp();
};
</script>
